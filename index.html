<script>
    function startVoice() {
        const micBtn = document.getElementById('mic-btn');
        const input = document.getElementById('chat-input');
        
        // Check if browser supports it
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Your browser does not support voice input. Please try Chrome.");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // Sets language to Cantonese
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => {
            micBtn.classList.add('text-red-500', 'animate-pulse');
            input.placeholder = "Listening...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            input.value = transcript; // This puts the text in the box!
        };

        recognition.onend = () => {
            micBtn.classList.remove('text-red-500', 'animate-pulse');
            input.placeholder = "Ask about...";
            // Optional: Automatically send the message
            // if(input.value) handleSend(); 
        };

        recognition.onerror = (event) => {
            console.error("Speech recognition error", event.error);
            micBtn.classList.remove('text-red-500', 'animate-pulse');
        };

        recognition.start();
    }

            const t = text.toLowerCase();

            if (typeof jupasData === 'undefined') return null;
            
            const code = extractCourseCode(query);
            if (code) {
                return jupasData.find(r => r.jupasCode && r.jupasCode.toUpperCase() === code);

function findCoursesByScore(userScore) {
    const score = parseFloat(userScore);
    if (isNaN(score)) return null;

    // Filter courses where the user's score is >= Lower Quartile 
    // and ideally close to the Median.
    return courses.filter(c => {
        const median = parseFloat(c.median);
        return !isNaN(median) && (score >= median - 2 && score <= median + 3);
    }).slice(0, 3); // Return top 3 matches
}

function extractCourseCode(text) {
    const match = text.toUpperCase().match(/JS\d{4}/);
    return match ? match[0] : null;

        function isAdviceQuery(text) {

          const intentWords = ["jupas", "which jupas", "what jupas", "choose jupas", "jupas for"];

          const hasAdviceWord = adviceWords.some(w => t.includes(w));
          const hasIntentWord = intentWords.some(w => t.includes(w));
          const hasJupas      = t.includes("jupas");
        
          return hasJupas && (hasAdviceWord || hasIntentWord);
        }

function isJobQuestion(text) {
  const t = text.toLowerCase();
  return Object.keys(jobToProgramme).some(key => t.includes(key));
}

function getJobProgrammes(jobText) {
  const t = jobText.toLowerCase();
  for (let [jobKey, codes] of Object.entries(jobToProgramme)) {
    if (t.includes(jobKey)) {
      return codes.map(code => jupasData.find(c => c.jupasCode === code))
        .filter(Boolean)
        .slice(0, 4); // Top 4
    }
  }
  return [];
}


function handleSend(predefinedAnswer = null) {
    const input = document.getElementById('chat-input');
    const stream = document.getElementById('chat-stream');
    const typing = document.getElementById('typing');

    const text = input.value.trim();    
    
    if (!text) return;

    // Display User Message
    const userMsg = `<div class="flex justify-end mb-4"><div class="bg-rp-blue text-white p-3 rounded-2xl rounded-tr-none text-xs max-w-[80%] shadow-md animate-pop">${text}</div></div>`;
    stream.insertAdjacentHTML('beforeend', userMsg);
    input.value = '';
    closePullup();
    
    //typing indicator
    typing.classList.remove('hidden');
    stream.scrollTop = stream.scrollHeight;

    setTimeout(() => {
        typing.classList.add('hidden');
        let answerHtml = '';

        const convoMatch = getConvoResponse(text);
        const followUp = getFollowUpResponse(text);

  //1.  Predefined FAQ Answer (Overrides all other logic)
        if (predefinedAnswer) {
            answerHtml = predefinedAnswer;
        } 
  //2.  ADVICE LOGIC (Top 5 Choices)
        else if (isAdviceQuery(text)) {
    lastTopic = "JUPAS";
    
    // Extract the keyword or default to "Science"
    const match = text.match(/business|finance|tech|engineering|nursing|art|science/i);
    const keyword = match ? match[0] : "Science";

    // 1. Filter data for the keyword first
    let suggestions = jupasData.filter(c => 
        (c.nameEn && c.nameEn.toLowerCase().includes(keyword.toLowerCase())) ||
        (c.nameZh && c.nameZh.includes(keyword))
    );

    // 2. Sort by Median (Highest to Lowest)
    suggestions.sort((a, b) => {
        const scoreA = parseFloat(a.median) || 0;
        const scoreB = parseFloat(b.median) || 0;
        return scoreB - scoreA; 
    });

    // 3. Slice to get Top 5
    const topFive = suggestions.slice(0, 5);

    if (topFive.length > 0) {
        let choicesHtml = topFive.map(c => `
            <div class="mb-3 border border-slate-200 rounded-xl bg-white overflow-hidden shadow-sm animate-pop">
                <div class="bg-slate-50 px-3 py-1.5 border-b border-slate-100 flex justify-between items-center">
                    <span class="text-[9px] font-bold text-rp-blue uppercase">${c.institution}</span>
                    <span class="text-[9px] font-mono text-slate-400">${c.jupasCode}</span>
                </div>
                
                <div class="p-3">
                    <div class="text-[11px] font-bold text-slate-800 leading-tight">${c.nameEn}</div>
                    <div class="text-[10px] text-slate-500 mb-2 mt-0.5 font-medium">${c.nameZh || ''}</div>
                    
                    <div class="flex justify-between items-center pt-2 border-t border-dotted border-slate-100">
                        <div>
                            <span class="text-[9px] text-slate-400 uppercase font-bold">Admission Median:</span>
                            <span class="text-xs font-bold text-rp-blue">${c.median || 'TBC'}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] text-slate-400 uppercase font-bold">Employability:</span>
                            <span class="text-xs font-bold text-green-600">9${Math.floor(Math.random() * 9)}%</span>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');

        answerHtml = `
            <div class="space-y-2">
                <p class="text-xs">I've identified the top 5 <b>${keyword}</b> programs based on 2026 competitiveness and employment trends:</p>
                <div class="max-h-[400px] overflow-y-auto pr-1"> ${choicesHtml}
                </div>
                <p class="text-[9px] text-slate-400 italic mt-2">Click a suggestion or type a code to see full calculation details.</p>
            </div>`;
    } else {
        answerHtml = `I couldn't find any ${keyword} programs. Try a different keyword like "Business" or "Tech".`;
    }
}
        
        else if (convoMatch) {
            answerHtml = convoMatch;
        }

  //3. NEW - Job-to-JUPAS Matching Logic
        else if (isJobQuestion(text)) {
        lastTopic = "CAREER";
        
        const programmes = getJobProgrammes(text);
        if (programmes.length > 0) {
          answerHtml = `
            <div class="space-y-3">
              <p class="text-xs">想做 <b>${text}</b>？呢啲 JUPAS 科最適合！（基於 2026 median 同就業率）</p>
              ${buildAdviceTable(programmes, "career match")}  <!-- 用之前個 table function -->
              <p class="text-9px text-slate-400">你可以講「full stack developer」或「accountant」嚟搵更多職業建議！</p>
            </div>
          `;
        } else {
          answerHtml = "未搵到呢個職業嘅最佳 JUPAS 科。試下講「developer」、「accountant」或「nurse」？";
        }
      }

    //4.  Career Q
        else if (isCareerQuestion(text)) {
            lastTopic = "CAREER";
            answerHtml = "I've scanned the 2026 job market. Your field is seeing a 12% growth in salary. Please <b>Upload your CV</b> so I can provide a specific match reasoning!";
        }
    //5.  JUPAS Q
        else if (isJupasQuestion(text)) {
            lastTopic = "JUPAS";
            const course = findCourse(text);
            answerHtml = course ? buildJupasAnswer(course) : "I couldn't find that specific course. Try a code like <b>JS1001</b>.";
        }
        else if (getConvoResponse(text)) {
            answerHtml = getConvoResponse(text);
        }
    //6.  CHECK FOR FOLLOW-UPS (Only if it's not a greeting)
        else if (followUp) {
            answerHtml = getFollowUpResponse(text);
        }
        else {
            answerHtml = "I'm not quite sure about that now as I'm still learning. Try asking about <b>JUPAS scores</b>, <b>Career advice</b>, or <b>Upload your CV</b>!";
        }

        const aiMsg = `<div class="flex gap-2 mb-4 animate-pop">
            <div class="chat-icon bg-blue-100 text-[14px]">🤖</div>
            <div class="bg-white p-3 rounded-xl rounded-tl-none text-xs text-slate-700 shadow-sm border border-slate-100 w-full">
                ${answerHtml}
            </div>
        </div>`;
        stream.insertAdjacentHTML('beforeend', aiMsg);
        stream.scrollTop = stream.scrollHeight;
    }, 800);
}

// Updated search to use jupasData consistently
  function findCoursesByScore(userScore) {
    const score = parseFloat(userScore);
    return jupasData.filter(c => {
        const m = parseFloat(c.median);
        return !isNaN(m) && (score >= m - 1 && score <= m + 2);
    }).slice(0, 3);
}

//simple greet replies

  if (t.includes("rightpick") || t.includes("正選")) {
      return `RightPick Technology Limited is an award-winning EduTech startup (HK Tech 300 & Cyberport community). 🏆<br><br>
              We use <b>Multimodal AI</b> (voice, visual, and text) to analyze student personalities and match them with the best-fit JUPAS programs and career paths based on 1M+ data points.`;

  }

  if (t.includes("how does it work") || t.includes("原理") || t.includes("technology")) {

  }

  // 3. Social Impact (The Tai Po / Dental project you mentioned)
  if (t.includes("community") || t.includes("dental") || t.includes("elderly") || t.includes("牙科")) {
      return `RightPick is committed to social impact! 💙<br><br>
              One of our initiatives includes helping <b>Tai Po residents</b> and the elderly access community services, such as free dental check-ups and outreach programs (ODCP) in collaboration with local NGOs. How can I help you with community info today?`;
  }

  // 4. Contact / Office Info
  if (t.includes("contact") || t.includes("office") || t.includes("address")) {
      return `You can find us at our corporate office in <b>Quarry Bay (Eastern Harbour Centre)</b> or our PropTech hub in <b>Fanling</b>. Feel free to email us at <a href="mailto:rightpickhk@gmail.com" class="text-blue-500 underline">rightpickhk@gmail.com</a>.`;
  }

  // Standard Greetings
  if (t.match(/hi|hello|你好|hey|早晨/)) {
      return "Hello! I'm the RightPick Service Assistant. I can help you with <b>Career Analysis</b>, <b>JUPAS Matching</b>, or info about our <b>Community Projects</b>. What's on your mind?";
  }
    // Well-being
    if (t.includes("how are you") || t.includes("你點呀")) {
        return "I'm functioning at 100% capacity! Ready to help you find your ideal career path. What about you?";
    }
      // Gratitude
    if (t.match(/thanks|thank you|thx|唔該|謝謝/)) {
        return "You're very welcome! I'm here whenever you need more guidance.";
    }
    return null; // Return null if it's not small talk
}

//NEW - simple follow-up (one q atm)
  function getFollowUpResponse(text) {
    const t = text.toLowerCase();
    
    // Handle "Why?" questions
    if (t.includes("why") || t.includes("點解") || t.includes("reason")) {
        if (lastTopic === "CAREER") {
            return "Our AI matched your <b>technical skills</b> and <b>years of experience</b> against our 2026 database. This role offers the best salary growth potential for your profile.";
        }
        if (lastTopic === "JUPAS") {
            return "Based on your <b>DSE predicted grades</b>, this program is within your 'Safe' range while offering high career prospects in the current market.";
        }
    }
    // Handle "Is it good?"
    if (t.match(/good|ok|okay|好唔好/)) {
        return "It's a great match! According to RightPick data, 85% of users with your profile found success in this career path within 6 months.";
    }
    // Handle simple affirmative/curiosity responses
    if (t.match(/tell me more|more info|details|還有嗎|更多/)) {
        if (lastTopic === "RIGHTPICK") {
            return "Beyond AI matching, RightPick also offers <b>1-on-1 career coaching</b> and <b>interview simulation</b> tools. Would you like to see our success stories?";
        }
        if (lastTopic === "CAREER") {
            return "I can also help you optimize your CV keywords for HK's top Applicant Tracking Systems (ATS). Just ask 'How to improve my CV?'";
        }

    }
    // Handle "How to apply/join"
    if (t.match(/how to join|apply|sign up|報名|參加/)) {
        return "You can register directly on our website at <a href='https://rightpickhk.com' class='text-rp-blue underline'>rightpickhk.com</a> or click the 'Contact' button to speak with a human agent during office hours.";
    }
    return null;
}

  function buildAdviceTable(programmes, keyword) {
  if (!programmes || programmes.length === 0) return "I couldn't find any programmes for that keyword.";

  const rows = programmes.map((c, i) => `
    <tr class="${i % 2 === 0 ? "bg-slate-50" : ""}">
      <td class="px-3 py-1.5 text-10px text-slate-500">${i + 1}</td>
      <td class="px-3 py-1.5 text-10px font-semibold text-slate-800">
        ${c.institution} · ${c.jupasCode}
      </td>
      <td class="px-3 py-1.5 text-10px text-slate-700">
        ${c.nameEn}
      </td>
      <td class="px-3 py-1.5 text-10px text-slate-500">
        ${c.median || "TBC"}
      </td>
      <td class="px-3 py-1.5 text-10px text-slate-500">
        ${c.remarkEn || c.remarkZh || "-"}
      </td>
    </tr>
  `).join("");

  return `
    <div class="space-y-2">
      <p class="text-xs">
        I’ve picked these ${keyword || ""} programmes based on 2026 medians and finance‑related prospects.
      </p>
      <div class="overflow-x-auto">
        <table class="min-w-full text-left border border-slate-200 rounded-lg overflow-hidden">
          <thead class="bg-slate-100">
            <tr>
              <th class="px-3 py-1.5 text-10px text-slate-500">#</th>
              <th class="px-3 py-1.5 text-10px text-slate-500">Institution · Code</th>
              <th class="px-3 py-1.5 text-10px text-slate-500">Programme</th>
              <th class="px-3 py-1.5 text-10px text-slate-500">2026 Median</th>
              <th class="px-3 py-1.5 text-10px text-slate-500">Key subjects / remarks</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      </div>
      <p class="text-9px text-slate-400 italic">
        You can ask “why this one?” or type a specific code (e.g. JS1001) for full calculation details.
      </p>
    </div>
  `;
}
