<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RightPick Pathfinder AI - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto+Sans+TC', sans-serif; overflow: hidden; }
        .bg-rp-blue { background-color: #0047AB; }
        .text-rp-blue { color: #0047AB; }
        
        #ai-sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
        }
        #ai-sidebar.active { transform: translateX(0); }

        #faq-pullup {
            transition: all 0.3s ease-in-out;
            max-height: 0;
            overflow: hidden;
            border-top: 0px solid transparent;
        }
        #faq-pullup.open {
            max-height: 400px;
            border-top: 1px solid #e2e8f0;
        }

        .animate-pop {
            animation: pop 0.3s ease-out forwards;
        }
        @keyframes pop {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-dot {
            width: 4px; height: 4px; margin: 0 1px;
            background: #94a3b8; border-radius: 50%;
            display: inline-block; animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .chat-icon { width: 32px; height: 32px; border-radius: 9999px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-200">

    <div class="w-full h-screen">
        <iframe src="https://rightpickhk.com" class="w-full h-full border-none"></iframe>
    </div>

    <button onclick="toggleSidebar()" class="fixed bottom-20 right-6 w-16 h-16 rounded-full bg-rp-blue text-white shadow-2xl z-50 flex flex-col items-center justify-center hover:scale-110 transition-transform active:scale-95 border-2 border-white/20">
        <span class="text-2xl">🤖</span>
        <span class="text-[9px] font-bold uppercase tracking-tight">Helper</span>
    </button>

    <div id="ai-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-white shadow-2xl z-[60] flex flex-col">
        
        <div class="bg-rp-blue p-6 text-white shrink-0">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-lg font-bold">Pathfinder AI</h2>
                    <p class="text-[10px] opacity-70 italic">RightPick HK Intelligence Concierge</p>
                </div>
                <button onclick="toggleSidebar()" class="text-2xl opacity-70 hover:opacity-100">&times;</button>
            </div>
            
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="showFAQ('JUPAS')" class="bg-white/20 px-3 py-1 rounded-full text-[10px] hover:bg-white/40 transition whitespace-nowrap">🎓 JUPAS</button>
                <button onclick="showFAQ('Career')" class="bg-white/20 px-3 py-1 rounded-full text-[10px] hover:bg-white/40 transition whitespace-nowrap">💼 Career</button>
                <button onclick="showFAQ('Social')" class="bg-white/20 px-3 py-1 rounded-full text-[10px] hover:bg-white/40 transition whitespace-nowrap">👵 Social Care</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50" id="chat-stream">
            <div class="flex gap-2 mb-4">
                <div class="chat-icon bg-blue-100 text-[14px]">🤖</div>
                <div class="bg-white p-3 rounded-xl rounded-tl-none text-xs text-slate-600 shadow-sm border border-slate-100">
                    Hello! Select a category above to see frequently asked questions, or type your own below.
                </div>
            </div>
        </div>

        <div id="faq-pullup" class="bg-white shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-10">
            <div class="p-3 bg-slate-50 border-b flex justify-between items-center">
                <span id="pullup-title" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2">Suggestions</span>
                <button onclick="closePullup()" class="text-slate-400 hover:text-rp-blue text-xl px-2">&times;</button>
            </div>
            <div id="faq-list" class="p-4 max-h-[220px] overflow-y-auto space-y-2 no-scrollbar"></div>
        </div>

        <div id="typing" class="hidden px-6 py-2 bg-white">
            <div class="flex gap-1 items-center">
                <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
                <span class="text-[10px] text-slate-400 ml-2 italic font-sans">Pathfinder is thinking...</span>
            </div>
        </div>

        <div class="p-4 border-t bg-white shrink-0">
            <div class="relative flex items-center bg-slate-100 rounded-xl px-4 py-2 border border-slate-200 shadow-inner">
                <input type="text" id="chat-input" placeholder="Ask about career analysis..." class="flex-1 bg-transparent text-xs outline-none py-1">
                <button onclick="handleSend()" class="text-rp-blue font-bold ml-2 hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                        <path d="M3.105 2.289a.75.75 0 00-.826.95l1.414 4.925A1.5 1.5 0 005.135 9.25h6.115a.75.75 0 010 1.5H5.135a1.5 1.5 0 00-1.442 1.086l-1.414 4.926a.75.75 0 00.826.95 28.896 28.896 0 0015.293-7.154.75.75 0 000-1.115A28.897 28.897 0 003.105 2.289z" />
                    </svg>
                </button>
            </div>
            <div class="flex justify-between mt-3 px-1">
                <span class="text-[9px] text-slate-400 font-medium">Powered by RightPick Big Data</span>
                <div class="flex gap-3 text-[9px] text-rp-blue font-bold">
                    <button class="hover:underline">Voice</button>
                    <button class="hover:underline">Upload CV</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FAQ Data with paired Results
        const faqContent = {
            'JUPAS': [
                { q: "How do I calculate my scores?", a: "To calculate your admission score, we use the <b>Best 5</b> or <b>4C+2X</b> formula. Based on 2026 trends, English and Mathematics carry a higher weighting (x1.5) for Engineering and Science faculties." },
                { q: "Show 2026 admission medians.", a: "For 2026, the estimated median for HKU Business is <b>28 points</b>, while CUHK Computer Science is projected at <b>26 points</b>. Would you like me to generate a comparison chart?" },
                { q: "Help me pick my Band A majors.", a: "Based on RightPick's job market analysis, we recommend placing <b>AI & Data Science</b> in A1 and <b>Global Business</b> in A2 to maximize both career prospects and admission probability." }
            ],
            'Career': [
                { q: "What is the 18-type personality test?", a: "Our proprietary <b>18-type test</b> expands on MBTI to specifically target the HK labor market. It identifies your 'Workplace Persona'—such as the <i>Strategic Architect</i> or <i>Community Liaison</i>." },
                { q: "Top 5 high-salary jobs in HK.", a: "Current Top 5 for Fresh Grads:<br>1. AI Engineer ($35k+)<br>2. ESG Consultant ($28k)<br>3. Fintech Dev ($32k)<br>4. Data Analyst ($25k)<br>5. Medical Tech ($30k)" },
                { q: "Match my skills to a career.", a: "Please <b>Upload your CV</b> using the button below! I will parse your internships and skills to find a 95% match in our current 2026 job database." }
            ],
            'Social': [
                { q: "Free dental check registration.", a: "RightPick is partnering with local clinics in Tai Po to offer free checks for those affected by recent events. Click [HERE] to view the schedule or register your ID." },
                { q: "Senior AI companionship demo.", a: "Our Senior AI provides 24/7 Cantonese companionship and health reminders. It is currently being trialed in 15 community centers across the New Territories." },
                { q: "Workplace Cantonese for minorities.", a: "We offer a 4-week 'Business Cantonese' crash course specifically for software developers and office staff. Next session starts April 1st." }
            ]
        };

        function toggleSidebar() {
            document.getElementById('ai-sidebar').classList.toggle('active');
        }

        function showFAQ(category) {
            const pullup = document.getElementById('faq-pullup');
            const list = document.getElementById('faq-list');
            const title = document.getElementById('pullup-title');
            
            title.innerText = `${category} Suggestions`;
            list.innerHTML = '';
            
            faqContent[category].forEach(item => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 bg-white border border-slate-100 rounded-xl text-[11px] text-slate-600 hover:border-rp-blue hover:text-rp-blue transition shadow-sm animate-pop";
                btn.innerHTML = `❓ ${item.q}`;
                btn.onclick = () => selectQuestion(item.q, item.a);
                list.appendChild(btn);
            });
            
            pullup.classList.add('open');
        }

        function closePullup() {
            document.getElementById('faq-pullup').classList.remove('open');
        }

        function selectQuestion(q, a) {
            const input = document.getElementById('chat-input');
            input.value = q;
            closePullup();
            setTimeout(() => handleSend(a), 300);
        }

        function handleSend(predefinedAnswer = null) {
            const input = document.getElementById('chat-input');
            const stream = document.getElementById('chat-stream');
            const typing = document.getElementById('typing');
            const text = input.value.trim();

            if (!text) return;

            // User Message
            const userMsg = `<div class="flex justify-end mb-4"><div class="bg-rp-blue text-white p-3 rounded-2xl rounded-tr-none text-xs max-w-[80%] shadow-md animate-pop">${text}</div></div>`;
            stream.insertAdjacentHTML('beforeend', userMsg);
            input.value = '';
            closePullup();

            // AI Response Flow
            typing.classList.remove('hidden');
            stream.scrollTop = stream.scrollHeight;

            setTimeout(() => {
                typing.classList.add('hidden');
                const answer = predefinedAnswer || `I'm looking into "${text}" for you. As this is a demo, please select a question from the categories above for specific data results!`;
                
                const aiMsg = `<div class="flex gap-2 mb-4 animate-pop">
                    <div class="chat-icon bg-blue-100 text-[14px]">🤖</div>
                    <div class="bg-white p-3 rounded-xl rounded-tl-none text-xs text-slate-700 shadow-sm border border-slate-100 leading-relaxed">
                        ${answer}
                    </div>
                </div>`;
                stream.insertAdjacentHTML('beforeend', aiMsg);
                stream.scrollTop = stream.scrollHeight;
            }, 1200);
        }
    </script>
</body>
</html>
